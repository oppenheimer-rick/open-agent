<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bouncing Ball Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; }
    #info {
      position: absolute; top: 12px; left: 12px;
      color: #fff; font-size: 14px;
      background: rgba(0,0,0,0.5); padding: 8px 12px;
      border-radius: 6px; pointer-events: none;
    }
  </style>
</head>
<body>

<div id="info">🔴 Drag &amp; throw the ball with your mouse!</div>

<!-- Three.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
(function () {
  /* ──────────────── SCENE SETUP ──────────────── */
  const scene    = new THREE.Scene();
  const camera   = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 3, 8);
  camera.lookAt(0, 1, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  /* ──────────────── LIGHTING ──────────────── */
  scene.add(new THREE.AmbientLight(0x404040, 1.5));
  const dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(3, 6, 4);
  dir.castShadow = true;
  scene.add(dir);

  /* ──────────────── FLOOR (box boundary) ──────────────── */
  const floorGeo = new THREE.BoxGeometry(8, 0.15, 8);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.6 });
  const floor    = new THREE.Mesh(floorGeo, floorMat);
  floor.position.set(0, -0.075, 0);
  floor.receiveShadow = true;
  scene.add(floor);

  // Wireframe walls for visual enclosure
  const wallMat = new THREE.LineBasicMaterial({ color: 0x4444aa, transparent: true, opacity: 0.3 });
  function makeWall(x, y, z, sx, sy, sz) {
    const geo = new THREE.BoxGeometry(sx, sy, sz);
    const edges = new THREE.EdgesGeometry(geo);
    const line = new THREE.LineSegments(edges, wallMat);
    line.position.set(x, y, z);
    scene.add(line);
  }
  // 4 walls around the floor
  makeWall(0, 1.5, -4, 8, 3, 0.05);   // back
  makeWall(0, 1.5, 4,  8, 3, 0.05);   // front
  makeWall(-4, 1.5, 0, 0.05, 3, 8);   // left
  makeWall(4, 1.5, 0,  0.05, 3, 8);   // right

  /* ──────────────── BALL ──────────────── */
  const ballRadius = 0.5;
  const ballGeo    = new THREE.SphereGeometry(ballRadius, 64, 64);
  const ballMat    = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.2, metalness: 0.1 });
  const ball       = new THREE.Mesh(ballGeo, ballMat);
  ball.castShadow  = true;
  scene.add(ball);

  // Shadow catcher on floor
  const shadowPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(2, 2),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = 0.01;
  scene.add(shadowPlane);

  /* ──────────────── PHYSICS STATE ──────────────── */
  const gravity    = 9.81;           // m/s²
  const restitution = 0.75;          // bounce factor (energy retained)
  const friction    = 0.99;          // air resistance per frame

  let ballPos  = new THREE.Vector3(0, 4, 0);   // start height 4 m
  let ballVel  = new THREE.Vector3(2, 0, 1.5); // initial velocity
  const bounds = 3.9;                              // wall boundary (floor is ±4)

  /* ──────────────── SHADOW FOLLOWS BALL ──────────────── */
  shadowPlane.position.x = ballPos.x;
  shadowPlane.position.z = ballPos.z;

  /* ──────────────── MOUSE INTERACTION (throw) ──────────────── */
  let isDragging = false;
  const mouse    = new THREE.Vector2();
  const raycaster = new THREE.Raycaster();
  const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, -1), 0); // horizontal plane for raycast

  renderer.domElement.addEventListener('pointerdown', (e) => {
    mouse.x  = (e.clientX / innerWidth)  * 2 - 1;
    mouse.y  = (e.clientY / innerHeight) * 2 - 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObject(ball);
    if (hits.length > 0) {
      isDragging = true;
      ballVel.set(0, 0, 0);
    }
  });

  renderer.domElement.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    mouse.x  = (e.clientX / innerWidth)  * 2 - 1;
    mouse.y  = (e.clientY / innerHeight) * 2 - 1;
    raycaster.setFromCamera(mouse, camera);
    const target = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, target);
    if (target) {
      ballPos.copy(target);
      ball.position.copy(ballPos);
    }
  });

  renderer.domElement.addEventListener('pointerup', () => {
    if (!isDragging) return;
    isDragging = false;
    // Throw in the direction of mouse motion
    const throwForce = new THREE.Vector3(
      (mouse.x - 0.5) * 12,
      Math.abs(mouse.y) * 6 + 2,
      (mouse.y - 0.5) * 8
    );
    ballVel.copy(throwForce);
  });

  /* ──────────────── ANIMATION LOOP ──────────────── */
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);

    if (!isDragging) {
      // Gravity
      ballVel.y -= gravity * clock.getDelta();

      // Air friction
      ballVel.x *= friction;
      ballVel.z *= friction;

      // Update position
      ballPos.addScaledVector(ballVel, 1 / 60); // approximate step (60 FPS)

      // Floor bounce
      if (ballPos.y - ballRadius < 0) {
        ballPos.y = ballRadius;
        ballVel.y = Math.abs(ballVel.y) * restitution;
        // Kill tiny bounces
        if (Math.abs(ballVel.y) < 0.3) ballVel.y = 0;
      }

      // Wall bounces (x & z boundaries)
      if (ballPos.x >  bounds) { ballPos.x = bounds;  ballVel.x *= -restitution; }
      if (ballPos.x < -bounds) { ballPos.x = -bounds;  ballVel.x *= -restitution; }
      if (ballPos.z >  bounds) { ballPos.z = bounds;   ballVel.z *= -restitution; }
      if (ballPos.z < -bounds) { ballPos.z = -bounds;   ballVel.z *= -restitution; }

      // Update mesh
      ball.position.copy(ballPos);
    }

    // Shadow follows ball horizontally
    shadowPlane.position.x = ballPos.x;
    shadowPlane.position.z = ballPos.z;
    // Scale shadow based on height (closer to ground = bigger)
    const heightRatio = Math.max(0, 1 - (ballPos.y / 6));
    shadowPlane.scale.setScalar(1 + heightRatio * 1.5);

    renderer.render(scene, camera);
  }

  /* ──────────────── RESIZE HANDLER ──────────────── */
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  animate();
})();
</script>
</body>
</html>
