<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earth Simulation</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-family: 'Segoe UI', sans-serif;
      font-size: 13px;
      pointer-events: none;
      text-align: center;
      letter-spacing: 0.5px;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
    }
    #loading .spinner {
      display: block;
      width: 40px; height: 40px;
      margin: 0 auto 15px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4b8bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #title-bar {
      position: absolute;
      top: 20px; left: 0; right: 0;
      text-align: center;
      pointer-events: none;
    }
    #title-bar h1 {
      font-family: 'Segoe UI', sans-serif;
      font-size: 24px;
      font-weight: 300;
      color: rgba(255,255,255,0.8);
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    #title-bar .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      color: rgba(75,139,255,0.6);
      letter-spacing: 3px;
      margin-top: 4px;
    }
    #stats {
      position: absolute;
      top: 80px; right: 20px;
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      pointer-events: none;
      text-align: right;
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div>Loading...</div>
  <div id="title-bar">
    <h1>Earth</h1>
    <div class="subtitle">PLANETARY SIMULATION</div>
  </div>
  <div id="stats"></div>
  <div id="info">Drag to orbit &middot; Scroll to zoom</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
      "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import { OrbitControls } from 'jsm/controls/OrbitControls.js';

  // ─── Texture URLs (NASA Blue Marble + supplementary) ──────────────
  const texBase = 'https://cdn.jsdelivr.net/gh/spaceengineers123/earth-textures@main/';
  const textures = {
    day:       texBase + '00_earthmap1k.jpg',
    bump:      texBase + '01_earthbump1k.jpg',
    spec:      texBase + '02_earthspec1k.jpg',
    lights:    texBase + '03_earthlights1k.jpg',
    clouds:    texBase + '04_earthcloudmap.jpg',
    cloudTrans: texBase + '05_earthcloudmaptrans.jpg',
  };

  // ─── Scene Setup ──────────────────────────────────────────────────
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 3.2);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 1.5;
  controls.maxDistance = 8;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.4;

  // ─── Starfield ────────────────────────────────────────────────────
  function createStarfield(count) {
    const geo = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];
    for (let i = 0; i < count; i++) {
      const r = 80 + Math.random() * 120;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      positions.push(r * Math.sin(phi) * Math.cos(theta),
                       r * Math.sin(phi) * Math.sin(theta),
                       r * Math.cos(phi));
      const c = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.15, 0.6 + Math.random() * 0.4);
      colors.push(c.r, c.g, c.b);
    }
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const mat = new THREE.PointsMaterial({ size: 0.15, vertexColors: true });
    return new THREE.Points(geo, mat);
  }
  scene.add(createStarfield(4000));

  // ─── Earth Group (with 23.4° axial tilt) ──────────────────────────
  const earthGroup = new THREE.Group();
  earthGroup.rotation.z = -23.4 * Math.PI / 180;
  scene.add(earthGroup);

  const loader = new THREE.TextureLoader();
  let loadedCount = 0;
  const totalTextures = Object.keys(textures).length;

  function onTexLoad() {
    loadedCount++;
    if (loadedCount >= totalTextures) document.getElementById('loading').style.display = 'none';
  }

  // ─── Earth Sphere ─────────────────────────────────────────────────
  const earthGeo = new THREE.IcosahedronGeometry(1, 20);

  const dayMat = new THREE.MeshPhongMaterial({
    map: loader.load(textures.day, onTexLoad),
    specularMap: loader.load(textures.spec, onTexLoad),
    bumpMap: loader.load(textures.bump, onTexLoad),
    bumpScale: 0.035,
    specular: new THREE.Color(0x333333),
  });
  dayMat.map.colorSpace = THREE.SRGBColorSpace;

  const earthMesh = new THREE.Mesh(earthGeo, dayMat);
  earthGroup.add(earthMesh);

  // ─── City Lights (night side) ─────────────────────────────────────
  const lightsMat = new THREE.MeshBasicMaterial({
    map: loader.load(textures.lights, onTexLoad),
    blending: THREE.AdditiveBlending,
  });
  const lightsMesh = new THREE.Mesh(earthGeo, lightsMat);
  earthGroup.add(lightsMesh);

  // ─── Cloud Layer ──────────────────────────────────────────────────
  const cloudMat = new THREE.MeshStandardMaterial({
    map: loader.load(textures.clouds, onTexLoad),
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    alphaMap: loader.load(textures.cloudTrans, onTexLoad),
  });
  const cloudMesh = new THREE.Mesh(earthGeo, cloudMat);
  cloudMesh.scale.setScalar(1.006);
  earthGroup.add(cloudMesh);

  // ─── Atmosphere Glow (Fresnel Shader) ─────────────────────────────
  const atmosUniforms = {
    color:     { value: new THREE.Color(0x4b8bff) },
    bias:      { value: 0.15 },
    power:     { value: 3.0 },
    scale:     { value: 1.25 },
  };

  const atmosMat = new THREE.ShaderMaterial({
    uniforms: atmosUniforms,
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vNormal = normalize(gl_NormalMatrix * normal);
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 color;
      uniform float bias;
      uniform float power;
      uniform float scale;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        float fresnel = 1.0 - dot(viewDir, vNormal);
        fresnel = pow(fresnel, power) + bias;
        fresnel = clamp(fresnel, 0.0, 1.0);
        gl_FragColor = vec4(color, fresnel * scale);
      }
    `,
    transparent: true,
    side: THREE.FrontSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const atmosMesh = new THREE.Mesh(new THREE.SphereGeometry(1.02, 64, 64), atmosMat);
  earthGroup.add(atmosMesh);

  // ─── Outer Glow Ring ──────────────────────────────────────────────
  const outerGlow = new THREE.ShaderMaterial({
    uniforms: {
      color: { value: new THREE.Color(0x8ab4ff) },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vNormal = normalize(gl_NormalMatrix * normal);
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 color;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        float fresnel = 1.0 - dot(viewDir, vNormal);
        float glow = pow(fresnel, 2.5) * 0.6;
        gl_FragColor = vec4(color, glow);
      }
    `,
    transparent: true,
    side: THREE.BackSide,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const outerGlowMesh = new THREE.Mesh(new THREE.SphereGeometry(1.25, 64, 64), outerGlow);
  earthGroup.add(outerGlowMesh);

  // ─── Sun Light ────────────────────────────────────────────────────
  const sunLight = new THREE.DirectionalLight(0xffffff, 2.5);
  sunLight.position.set(-3, 1, 2);
  scene.add(sunLight);

  const ambient = new THREE.AmbientLight(0x222244, 0.6);
  scene.add(ambient);

  // ─── Sun Visualization (multi-layered glow) ────────────────────────
  function createSunGlow(size, color, opacity) {
    return new THREE.ShaderMaterial({
      uniforms: { color: { value: new THREE.Color(color) } },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPos;
        void main() {
          vNormal = normalize(gl_NormalMatrix * normal);
          vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 color;
        varying vec3 vNormal;
        varying vec3 vWorldPos;
        void main() {
          vec3 viewDir = normalize(cameraPosition - vWorldPos);
          float fresnel = 1.0 - dot(viewDir, vNormal);
          float glow = pow(fresnel, 2.0) * ${opacity};
          gl_FragColor = vec4(color, glow);
        }
      `,
      transparent: true, side: THREE.FrontSide,
      blending: THREE.AdditiveBlending, depthWrite: false,
    });
  }

  const sunLayers = [
    { size: 0.15, color: 0xffffcc, opacity: 1.2 },   // core
    { size: 0.30, color: 0xffdd88, opacity: 0.5 },   // inner glow
    { size: 0.60, color: 0xffaa44, opacity: 0.25 },  // outer halo
    { size: 1.20, color: 0xff6600, opacity: 0.1 },   // corona
  ];

  const sunGroup = new THREE.Group();
  for (const layer of sunLayers) {
    const mat = createSunGlow(layer.size, layer.color, layer.opacity);
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(layer.size, 32, 32), mat);
    sunGroup.add(mesh);
  }
  sunGroup.position.copy(sunLight.position);
  scene.add(sunGroup);

  // ─── Improved Atmosphere (gradient: blue → warm orange at terminator) ──
  const atmosGradUniforms = {
    colorDay:    { value: new THREE.Color(0x4b8bff) },
    colorNight:  { value: new THREE.Color(0x1a1a3a) },
    colorSunset: { value: new THREE.Color(0xff6633) },
    bias:        { value: 0.15 },
    power:       { value: 2.8 },
    scale:       { value: 1.30 },
    sunDir:      { value: new THREE.Vector3(-3, 1, 2).normalize() },
  };

  const atmosGradMat = new THREE.ShaderMaterial({
    uniforms: atmosGradUniforms,
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vNormal = normalize(gl_NormalMatrix * normal);
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 colorDay;
      uniform vec3 colorNight;
      uniform vec3 colorSunset;
      uniform float bias;
      uniform float power;
      uniform float scale;
      uniform vec3 sunDir;
      varying vec3 vNormal;
      varying vec3 vWorldPos;
      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        float fresnel = 1.0 - dot(viewDir, vNormal);
        fresnel = pow(fresnel, power) + bias;
        fresnel = clamp(fresnel, 0.0, 1.0);

        // Sun-facing vs night-side coloring
        float sunDot = dot(vNormal, sunDir);
        float sunsetFactor = smoothstep(-0.2, 0.3, sunDot);
        vec3 atmosColor = mix(colorNight, colorDay, sunsetFactor);
        // Add warm sunset band
        float sunsetBand = exp(-pow((abs(sunDot) - 0.15) / 0.3, 2.0));
        atmosColor = mix(atmosColor, colorSunset, sunsetBand * (1.0 - sunsetFactor) * 0.6);

        gl_FragColor = vec4(atmosColor, fresnel * scale);
      }
    `,
    transparent: true, side: THREE.FrontSide,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });

  const atmosGradMesh = new THREE.Mesh(new THREE.SphereGeometry(1.03, 64, 64), atmosGradMat);
  earthGroup.add(atmosGradMesh);

 // ─── Animation Loop ───────────────────────────────────────────────
  const statsEl = document.getElementById('stats');
  let lastTime = performance.now();
  let fpsFrames = 0;

  function animate() {
    requestAnimationFrame(animate);
    controls.update();

    earthMesh.rotation.y += 0.0018;
    lightsMesh.rotation.y += 0.0018;
    cloudMesh.rotation.y += 0.0022;
    atmosGradMat.uniforms.sunDir.value.copy(sunLight.position).normalize();

    // FPS counter
    const now = performance.now();
    fpsFrames++;
    if (now - lastTime >= 500) {
      const fps = Math.round(fpsFrames / ((now - lastTime) / 1000));
      statsEl.innerHTML = `FPS: ${fps}<br>Earth rotation: ${(earthMesh.rotation.y * 57.3).toFixed(1)}°`;
      fpsFrames = 0;
      lastTime = now;
    }

    renderer.render(scene, camera);
  }
  animate();

  // ─── Resize Handler ───────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
  </script>
</body>
</html>
