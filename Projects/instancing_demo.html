<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js Instancing Showcase</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; }
#info {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.7); font-size: 13px; text-align: center;
  pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
#loading {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #0a0a0a; color: #fff; font-size: 18px; z-index: 9999;
  transition: opacity 0.6s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="loading">Loading instancing demo...</div>
<div id="info">Three.js Instancing Showcase — Orbit | Zoom | Scroll to adjust particle count</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Stats } from 'three/addons/libs/stats.module.js';
import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

let scene, camera, renderer, controls, stats, gui;
let clock = new THREE.Clock();
let particleSystem, treeSystem, buildingSystem, crowdSystem;

const CONFIG = {
  particleCount: 5000,
  treeCount: 200,
  buildingCount: 80,
  crowdCount: 150,
  groundSize: 120,
  fogDensity: 0.012,
  particleSpeed: 0.5,
  crowdSpeed: 2.0,
  timeOfDay: 0.35,
};

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.FogExp2(0x1a1a2e, CONFIG.fogDensity);

  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(30, 25, 40);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  stats = new Stats();
  document.body.appendChild(stats.dom);

  setupLighting();
  createGround();
  
  particleSystem = createParticleSystem();
  treeSystem = createTreeSystem();
  buildingSystem = createBuildingSystem();
  crowdSystem = createCrowdSystem();

  setupGUI();

  document.getElementById('loading').classList.add('hidden');
  animate();
}

function setupLighting() {
  const ambient = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(50, 50, 20);
  dirLight.castShadow = true;
  scene.add(dirLight);
}

function createGround() {
  const geo = new THREE.PlaneGeometry(CONFIG.groundSize, CONFIG.groundSize);
  const mat = new THREE.MeshStandardMaterial({ color: 0x223322 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.receiveShadow = true;
  scene.add(mesh);
}

function createParticleSystem() {
  const geo = new THREE.SphereGeometry(0.1, 8, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff });
  const mesh = new THREE.InstancedMesh(geo, mat, CONFIG.particleCount);
  
  const dummy = new THREE.Object3D();
  for (let i = 0; i < CONFIG.particleCount; i++) {
    dummy.position.set(
      (Math.random() - 0.5) * CONFIG.groundSize,
      Math.random() * 20,
      (Math.random() - 0.5) * CONFIG.groundSize
    );
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
  return mesh;
}

function createTreeSystem() {
  const geo = new THREE.ConeGeometry(0.5, 2, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0x114411 });
  const mesh = new THREE.InstancedMesh(geo, mat, CONFIG.treeCount);
  
  const dummy = new THREE.Object3D();
  for (let i = 0; i < CONFIG.treeCount; i++) {
    dummy.position.set(
      (Math.random() - 0.5) * CONFIG.groundSize,
      1,
      (Math.random() - 0.5) * CONFIG.groundSize
    );
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
  return mesh;
}

function createBuildingSystem() {
  const geo = new THREE.BoxGeometry(2, 1, 2);
  const mat = new THREE.MeshStandardMaterial({ color: 0x444455 });
  const mesh = new THREE.InstancedMesh(geo, mat, CONFIG.buildingCount);
  
  const dummy = new THREE.Object3D();
  for (let i = 0; i < CONFIG.buildingCount; i++) {
    const h = 2 + Math.random() * 10;
    dummy.position.set(
      (Math.random() - 0.5) * CONFIG.groundSize,
      h/2,
      (Math.random() - 0.5) * CONFIG.groundSize
    );
    dummy.scale.y = h;
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
  return mesh;
}

function createCrowdSystem() {
  const geo = new THREE.CapsuleGeometry(0.2, 0.5, 4, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
  const mesh = new THREE.InstancedMesh(geo, mat, CONFIG.crowdCount);
  
  const dummy = new THREE.Object3D();
  for (let i = 0; i < CONFIG.crowdCount; i++) {
    dummy.position.set(
      (Math.random() - 0.5) * CONFIG.groundSize,
      0.5,
      (Math.random() - 0.5) * CONFIG.groundSize
    );
    dummy.updateMatrix();
    mesh.setMatrixAt(i, dummy.matrix);
  }
  scene.add(mesh);
  return mesh;
}

function setupGUI() {
  gui = new GUI();
  gui.add(CONFIG, 'particleSpeed', 0, 2);
  gui.add(CONFIG, 'crowdSpeed', 0, 5);
}

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Animate particles
  const dummy = new THREE.Object3D();
  for (let i = 0; i < CONFIG.particleCount; i++) {
    particleSystem.getMatrixAt(i, dummy.matrix);
    dummy.position.setFromMatrixPosition(dummy.matrix);
    dummy.position.y += Math.sin(elapsed + i) * 0.01 * CONFIG.particleSpeed;
    dummy.updateMatrix();
    particleSystem.setMatrixAt(i, dummy.matrix);
  }
  particleSystem.instanceMatrix.needsUpdate = true;

  controls.update();
  stats.update();
  renderer.render(scene, camera);
}

init();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
