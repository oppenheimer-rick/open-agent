<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #0b0c10; font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .calculator {
      width: 340px; background: #1f2937; border-radius: 20px;
      padding: 24px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
    }

    /* ── Display ── */
    .display-wrap { margin-bottom: 18px; }
    #expression {
      width: 100%; min-height: 24px; text-align: right;
      font-size: 15px; color: #9ca3af; padding: 0 6px;
      background: transparent; border: none; outline: none;
    }
    #result {
      width: 100%; height: 56px; text-align: right;
      font-size: 32px; color: #f3f4f6; padding: 8px 6px;
      background: transparent; border: none; outline: none;
    }

    /* ── Button Grid ── */
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

    button {
      padding: 18px; font-size: 20px; border: none; border-radius: 12px;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      color: #e5e7eb; background: #374151; user-select: none;
    }
    button:hover { background: #4b5563; transform: scale(1.04); }
    button:active { transform: scale(0.96); }

    .op   { background: #6366f1; }
    .op:hover  { background: #818cf8; }
    .eq   { background: #22c55e; color: #fff; }
    .eq:hover  { background: #4ade80; }
    .fn   { background: #9ca3af; color: #1f2937; }
    .fn:hover  { background: #d1d5db; }

    /* ── Responsive ── */
    @media (max-width: 400px) {
      .calculator { width: 95vw; padding: 16px; }
      button { padding: 14px; font-size: 18px; }
      #result { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display-wrap">
      <input id="expression" type="text" value="" readonly>
      <input id="result"     type="text" value="0"       readonly>
    </div>
    <div class="buttons">
      <button class="fn" onclick="clearAll()">AC</button>
      <button class="fn" onclick="toggleSign()">+/−</button>
      <button class="fn" onclick="appendPercent()">%</button>
      <button class="op"   onclick="appendOp('/')">÷</button>

      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button class="op"   onclick="appendOp('*')">×</button>

      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button class="op"   onclick="appendOp('-')">−</button>

      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>
      <button class="op"   onclick="appendOp('+')">+</button>

      <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
      <button onclick="appendNumber('.')">.</button>
      <button class="eq"   onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const exprEl = document.getElementById('expression');
    const resEl  = document.getElementById('result');

    let currentInput = '0';
    let expression   = '';   // built-up string for eval
    let justCalculated = false;

    function updateDisplay() {
      resEl.value = currentInput;
      exprEl.value = expression;
    }

    function clearAll() {
      currentInput = '0';
      expression = '';
      justCalculated = false;
      updateDisplay();
    }

    function appendNumber(n) {
      if (justCalculated && !isNaN(n)) {
        currentInput = n === '.' ? '0.' : n;
        expression = '';
        justCalculated = false;
      } else {
        if (n === '.' && currentInput.includes('.')) return;
        if (currentInput === '0' && n !== '.') currentInput = n;
        else currentInput += n;
      }
      updateDisplay();
    }

    function appendOp(op) {
      justCalculated = false;
      // replace trailing operator if user changes mind
      const lastChar = expression.slice(-1);
      if ('+-*/'.includes(lastChar)) {
        expression = expression.slice(0, -1) + op;
      } else {
        expression += currentInput + op;
      }
      currentInput = '0';
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput === '0') return;
      currentInput = String(-parseFloat(currentInput));
      updateDisplay();
    }

    function appendPercent() {
      const num = parseFloat(currentInput);
      if (!isNaN(num)) {
        currentInput = String(num / 100);
        updateDisplay();
      }
    }

    function backspace() {
      if (justCalculated) return;
      if (currentInput.length > 1) {
        currentInput = currentInput.slice(0, -1);
      } else {
        currentInput = '0';
      }
      updateDisplay();
    }

    function calculate() {
      try {
        let build = expression + currentInput;
        // only allow safe characters
        if (/[^0-9+\-*/.() ]/.test(build)) throw 0;
        let result = Function('"use strict"; return (' + build + ')')();
        if (result === Infinity || result === -Infinity || isNaN(result)) {
          currentInput = 'Error';
        } else {
          // round to avoid floating-point drift
          currentInput = String(Math.round(result * 1e12) / 1e12);
        }
        expression = '';
        justCalculated = true;
        updateDisplay();
      } catch {
        currentInput = 'Error';
        expression = '';
        justCalculated = true;
        updateDisplay();
      }
    }

    /* ── Keyboard Support ── */
    document.addEventListener('keydown', (e) => {
      const k = e.key;
      if (k >= '0' && k <= '9') appendNumber(k);
      else if (k === '.') appendNumber('.');
      else if (k === '+') appendOp('+');
      else if (k === '-') appendOp('-');
      else if (k === '*') appendOp('*');
      else if (k === '/') { e.preventDefault(); appendOp('/'); }
      else if (k === 'Enter' || k === '=') { e.preventDefault(); calculate(); }
      else if (k === 'Backspace') { e.preventDefault(); backspace(); }
      else if (k === 'Escape') clearAll();
      else if (k === '%') appendPercent();
    });
  </script>
</body>
</html>
