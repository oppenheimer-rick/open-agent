<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Ball Simulation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #0a0a0a;
        font-family: sans-serif;
      }
      canvas {
        display: block;
      }
      #hud {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: #ccc;
        font-size: 14px;
        letter-spacing: 0.5px;
        text-align: center;
        pointer-events: none;
        user-select: none;
      }
      #hud span {
        background: rgba(0, 0, 0, 0.65);
        padding: 8px 16px;
        border-radius: 6px;
        backdrop-filter: blur(4px);
      }
      #speedometer {
        position: absolute;
        bottom: 24px;
        right: 24px;
        color: #0f0;
        font-size: 13px;
        font-family: monospace;
        pointer-events: none;
        user-select: none;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <span
        >&#8592; &#8593; &#8594; &#8600; — move &nbsp;&nbsp;|&nbsp;&nbsp; Space
        — reset</span
      >
    </div>
    <div id="speedometer">velocity: 0.00 m/s</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";

      /* ─── Constants ─────────────────────────────── */
      const BALL_RADIUS = 1;
      const GROUND = 50; // plane size in units
      const BOUND = 24.5; // soft wall limit
      const MAX_SPEED = 30; // velocity cap (units/s)
      const GRAVITY = -18; // m/s²
      const JUMP_POWER = 8; // upward impulse per bounce threshold
      const BOUNCE_FACTOR = 0.45; // energy retained on floor bounce
      const FRICTION = 0.96; // ground damping factor per frame
      const ACCEL = 22; // key press acceleration (units/s²)
      const CAM_HEIGHT = 14;
      const CAM_DIST = 18;
      const CAM_SMOOTH = 5; // lerp speed for camera

      /* ─── Scene Setup ───────────────────────────── */
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x12122a);
      scene.fog = new THREE.FogExp2(0x12122a, 0.013);

      const camera = new THREE.PerspectiveCamera(
        55,
        innerWidth / innerHeight,
        0.1,
        200,
      );
      camera.position.set(0, CAM_HEIGHT, CAM_DIST);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      /* ─── Lighting ──────────────────────────────── */
      scene.add(new THREE.AmbientLight(0x404060, 1.5));

      const dirLight = new THREE.DirectionalLight(0xffffff, 2.8);
      dirLight.position.set(10, 18, 10);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize = { width: 2048, height: 2048 };
      dirLight.shadow.camera.near = 1;
      dirLight.shadow.camera.far = 60;
      dirLight.shadow.camera.left = -35;
      dirLight.shadow.camera.right = 35;
      dirLight.shadow.camera.top = 35;
      dirLight.shadow.camera.bottom = -35;
      scene.add(dirLight);

      const fillLight = new THREE.PointLight(0x4488ff, 2.5, 40);
      fillLight.position.set(-10, 10, -6);
      scene.add(fillLight);

      const rimLight = new THREE.PointLight(0xff6633, 2, 35);
      rimLight.position.set(8, 6, -8);
      scene.add(rimLight);

      /* ─── Ground ────────────────────────────────── */
      const groundGeo = new THREE.PlaneGeometry(GROUND, GROUND);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a40,
        roughness: 0.85,
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      const grid = new THREE.GridHelper(GROUND, 40, 0x3a3a7a, 0x1e1e40);
      scene.add(grid);

      /* ─── Ball ──────────────────────────────────── */
      const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 64, 64);
      const ballMat = new THREE.MeshStandardMaterial({
        color: 0xddeeff,
        roughness: 0.2,
        metalness: 0.8,
      });
      const ball = new THREE.Mesh(ballGeo, ballMat);
      ball.position.y = BALL_RADIUS;
      ball.castShadow = true;
      scene.add(ball);

      // Shadow disc beneath ball (fake contact shadow)
      const shadowGeo = new THREE.CircleGeometry(BALL_RADIUS * 1.2, 32);
      const shadowMat = new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.25,
      });
      const contactShadow = new THREE.Mesh(shadowGeo, shadowMat);
      contactShadow.rotation.x = -Math.PI / 2;
      contactShadow.position.y = 0.01;
      scene.add(contactShadow);

      /* ─── Physics State ─────────────────────────── */
      const vel = new THREE.Vector3(0, 0, 0); // velocity vector
      let prevY = BALL_RADIUS; // previous Y for bounce calc

      /* ─── Input Tracking ────────────────────────── */
      const keys = {};
      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (
          ["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(
            e.code,
          )
        ) {
          e.preventDefault();
        }
        if (e.code === "Space") resetBall();
      });
      window.addEventListener("keyup", (e) => {
        keys[e.code] = false;
      });

      function resetBall() {
        ball.position.set(0, BALL_RADIUS, 0);
        vel.set(0, 0, 0);
        contactShadow.position.y = 0.01;
        contactShadow.scale.setScalar(1);
      }

      /* ─── Camera State ──────────────────────────── */
      const camTarget = new THREE.Vector3();
      const camPos = new THREE.Vector3(0, CAM_HEIGHT, CAM_DIST);

      /* ─── Animation Loop ────────────────────────── */
      const clock = new THREE.Clock();
      const speedEl = document.getElementById("speedometer");

      function animate() {
        requestAnimationFrame(animate);
        let dt = clock.getDelta();
        if (dt > 0.05) dt = 0.05; // clamp large gaps (tab-switching)

        /* ── Direction from input ──────────────── */
        let dx = 0,
          dz = 0;
        if (keys["ArrowLeft"] || keys["KeyA"]) dx -= 1;
        if (keys["ArrowRight"] || keys["KeyD"]) dx += 1;
        if (keys["ArrowUp"] || keys["KeyW"]) dz -= 1;
        if (keys["ArrowDown"] || keys["KeyS"]) dz += 1;

        const hasInput = dx !== 0 || dz !== 0;
        if (hasInput) {
          const len = Math.sqrt(dx * dx + dz * dz);
          dx /= len;
          dz /= len;
        }

        /* ── Accelerate ────────────────────────── */
        vel.x += dx * ACCEL * dt;
        vel.z += dz * ACCEL * dt;

        /* ── Clamp horizontal speed ────────────── */
        const hSpeed = Math.sqrt(vel.x ** 2 + vel.z ** 2);
        if (hSpeed > MAX_SPEED) {
          const scale = MAX_SPEED / hSpeed;
          vel.x *= scale;
          vel.z *= scale;
        }

        /* ── Gravity ───────────────────────────── */
        vel.y += GRAVITY * dt;

        /* ── Floor collision & bounce ──────────── */
        const isOnGround = ball.position.y <= BALL_RADIUS + 0.01;

        if (isOnGround) {
          ball.position.y = BALL_RADIUS;
          // Only bounce if descending and speed above threshold
          if (vel.y < 0 && Math.abs(vel.y) > JUMP_POWER) {
            vel.y = -vel.y * BOUNCE_FACTOR;
          } else {
            vel.y = 0; // rest on ground
          }
        }

        /* ── Ground friction ───────────────────── */
        if (isOnGround) {
          vel.x *= FRICTION;
          vel.z *= FRICTION;
          // Snap to zero when very slow
          const fs = Math.sqrt(vel.x ** 2 + vel.z ** 2);
          if (fs < 0.1) {
            vel.x = 0;
            vel.z = 0;
          }
        }

        /* ── Air drag (minor) ──────────────────── */
        const airDamp = 0.999;
        if (!isOnGround) {
          vel.x *= airDamp;
          vel.z *= airDamp;
        }

        /* ── Update position ───────────────────── */
        ball.position.x += vel.x * dt;
        ball.position.y += vel.y * dt;
        ball.position.z += vel.z * dt;

        /* ── Boundary walls (soft bounce) ──────── */
        for (const axis of ["x", "z"]) {
          if (ball.position[axis] > BOUND) {
            ball.position[axis] = BOUND;
            vel[axis] *= -0.4;
          }
          if (ball.position[axis] < -BOUND) {
            ball.position[axis] = -BOUND;
            vel[axis] *= -0.4;
          }
        }

        /* ── Ball spin (rolling visual) ────────── */
        const moveSpeed = Math.sqrt(vel.x ** 2 + vel.z ** 2);
        if (moveSpeed > 0.1 && isOnGround) {
          const axis = new THREE.Vector3(-vel.z, 0, vel.x).normalize();
          ball.rotateOnWorldAxis(axis, (moveSpeed / BALL_RADIUS) * dt);
        }

        /* ── Contact shadow ────────────────────── */
        contactShadow.position.x = ball.position.x;
        contactShadow.position.z = ball.position.z;
        const shadowDist = (ball.position.y - BALL_RADIUS) / 5 + 1;
        const shadowScale = Math.max(0.3, 2 - shadowDist * 0.3);
        contactShadow.scale.setScalar(shadowScale);
        shadowMat.opacity = Math.max(0.05, 0.3 - shadowDist * 0.06);

        /* ── Camera follow (smooth lerp) ───────── */
        camTarget.copy(ball.position);
        const desired = new THREE.Vector3(
          camTarget.x,
          CAM_HEIGHT,
          camTarget.z + CAM_DIST,
        );
        camPos.lerp(desired, dt * CAM_SMOOTH);
        camera.position.copy(camPos);
        camera.lookAt(camTarget.x, 0, camTarget.z);

        /* ── HUD ─────────────────────────────────── */
        const spd = Math.round(hSpeed * 100) / 100;
        speedEl.textContent = `velocity: ${spd.toFixed(2)} m/s`;

        renderer.render(scene, camera);
      }

      /* ─── Resize ────────────────────────────────── */
      window.addEventListener("resize", () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      animate();
    </script>
  </body>
</html>
