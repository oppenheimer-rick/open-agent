<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periodic Table of Elements</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    margin-bottom: 16px;
    font-size: 2rem;
    letter-spacing: 2px;
    color: #e0e0e0;
    text-transform: uppercase;
  }
  .table-container {
    display: grid;
    grid-template-columns: repeat(18, 62px);
    grid-template-rows: repeat(10, 62px);
    gap: 3px;
    width: fit-content;
  }
  .element {
    width: 62px;
    height: 62px;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .element:hover {
    transform: scale(1.18);
    box-shadow: 0 0 14px rgba(255,255,255,0.35);
    z-index: 10;
  }
  .element .number { font-size: 9px; position: absolute; top: 3px; left: 4px; }
  .element .symbol  { font-size: 22px; font-weight: 700; margin-top: 6px; }
  .element .name   { font-size: 8px; text-align: center; line-height: 1.1; word-break: break-word; }

  /* Category colours */
  .alkali        { background: #e06b6b; color: #fff; }
  .alkaline      { background: #f5a862; color: #fff; }
  .transition    { background: #f0c040; color: #333; }
  .post-trans    { background: #a3c94a; color: #333; }
  .metalloid     { background: #76b874; color: #fff; }
  .nonmetal      { background: #4e9bcf; color: #fff; }
  .halogen       { background: #7a72c8; color: #fff; }
  .noble         { background: #5b5aef; color: #fff; }
  .lanthanide    { background: #d47fb9; color: #fff; }
  .actinide      { background: #c03e3e; color: #fff; }

  /* Legend */
  .legend {
    margin-top: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 900px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
  }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; }

  /* Separator labels */
  .label-row {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    height: 26px;
  }

  /* Tooltip */
  .tooltip {
    display: none;
    position: fixed;
    background: #222;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 100;
    max-width: 220px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.6);
  }
  .tooltip.show { display: block; }
</style>
</head>
