<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar System Simulation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Inter', sans-serif; color: #fff; user-select: none; }

/* ── Loading Screen ── */
#loader {
  position: fixed; inset: 0; z-index: 1000; background: #050510;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease;
}
#loader.hidden { opacity: 0; pointer-events: none; }
.loader-ring { width: 60px; height: 60px; border: 3px solid rgba(0,200,255,0.15); border-top-color: #0cf; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { color: #0cf; font-family: 'JetBrains Mono', monospace; margin-top: 20px; letter-spacing: 4px; font-size: 13px; }

/* ── HUD Header ── */
#hud-top {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10; pointer-events: none;
  display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 32px;
}
#hud-top > * { pointer-events: auto; }
.title-block h1 { font-size: 28px; font-weight: 600; letter-spacing: 3px; background: linear-gradient(90deg, #0cf, #4a9eff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.title-block .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 2px; margin-top: 4px; }

/* ── Stats Panel (top-right) ── */
#stats-panel { display: flex; gap: 24px; align-items: flex-start; }
.stat-box { text-align: right; }
.stat-label { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1.5px; text-transform: uppercase; }
.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 18px; color: #fff; margin-top: 4px; }

/* ── Bottom Controls ── */
#hud-bottom {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: center; gap: 16px; align-items: flex-end; padding: 24px 32px;
  pointer-events: none;
}
#hud-bottom > * { pointer-events: auto; }

.ctrl-group { display: flex; align-items: center; gap: 10px; background: rgba(5,10,25,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0,200,255,0.15); border-radius: 10px; padding: 12px 18px; }
.ctrl-group label { font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
input[type=range] { -webkit-appearance: none; width: 180px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #0cf; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(0,200,255,0.4); }

.btn { background: rgba(0,200,255,0.08); border: 1px solid rgba(0,200,255,0.25); color: #0cf; padding: 10px 20px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 1px; border-radius: 8px; cursor: pointer; transition: all 0.25s ease; text-transform: uppercase; }
.btn:hover { background: rgba(0,200,255,0.18); box-shadow: 0 0 16px rgba(0,200,255,0.15); }
.btn.active { background: rgba(0,200,255,0.25); border-color: #0cf; }

/* ── Planet Info Panel (right side) ── */
#info-panel {
  position: fixed; right: -420px; top: 100px; bottom: 100px; width: 360px; z-index: 10;
  background: rgba(5,10,25,0.85); backdrop-filter: blur(16px);
  border: 1px solid rgba(0,200,255,0.15); border-right: none; border-radius: 16px 0 0 16px;
  padding: 32px 28px; transition: right 0.4s cubic-bezier(0.175,0.885,0.32,1.275); overflow-y: auto;
}
#info-panel.open { right: 0; }

#info-panel .p-name { font-size: 36px; font-weight: 600; letter-spacing: 2px; margin-bottom: 4px; }
#info-panel .p-type { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #0cf; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }

.info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
.info-row .label { color: rgba(255,255,255,0.4); }
.info-row .value { font-family: 'JetBrains Mono', monospace; color: #fff; }

#info-panel .p-desc { margin-top: 20px; color: rgba(255,255,255,0.6); line-height: 1.7; font-size: 13px; }

.close-btn { position: absolute; top: 16px; right: 20px; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 18px; cursor: pointer; padding: 4px; transition: color 0.2s; }
.close-btn:hover { color: #fff; }

/* ── Planet Labels (3D overlay) ── */
.planet-label {
  position: absolute; pointer-events: none; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-transform: uppercase;
  transform: translate(-50%, -150%); white-space: nowrap; transition: opacity 0.3s;
}

/* ── Planet Selector (left side) ── */
#planet-selector {
  position: fixed; left: 24px; top: 50%; transform: translateY(-50%); z-index: 10;
  display: flex; flex-direction: column; gap: 6px; pointer-events: auto;
}
.planet-dot {
  width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: all 0.25s ease;
  border: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace;
}
.planet-dot:hover { border-color: rgba(0,200,255,0.5); transform: scale(1.15); }
.planet-dot.active { border-color: #0cf; box-shadow: 0 0 12px rgba(0,200,255,0.3); color: #fff; }

/* ── Tooltip ── */
#tooltip { position: fixed; pointer-events: none; opacity: 0; background: rgba(5,10,25,0.85); border: 1px solid rgba(0,200,255,0.25); color: #fff; padding: 6px 12px; border-radius: 6px; transform: translate(-50%, -130%); transition: opacity 0.2s; font-family: 'JetBrains Mono', monospace; font-size: 11px; z-index: 20; letter-spacing: 0.5px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); border-radius: 2px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  #hud-top { padding: 16px; }
  .title-block h1 { font-size: 20px; }
  #stats-panel { display: none; }
  #planet-selector { left: 12px; }
  .planet-dot { width: 28px; height: 28px; font-size: 8px; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">INITIALIZING SYSTEMS</div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- HUD Top -->
<div id="hud-top">
  <div class="title-block">
    <h1>SOLAR ENGINE</h1>
    <div class="subtitle">ORBITAL MECHANICS SIMULATOR // V2.0</div>
  </div>
  <div id="stats-panel">
    <div class="stat-box">
      <div class="stat-label">Simulation Time</div>
      <div class="stat-value" id="sim-time">Year 0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Objects Tracked</div>
      <div class="stat-value">109</div>
    </div>
  </div>
</div>

<!-- Planet Selector -->
<div id="planet-selector"></div>

<!-- Info Panel -->
<div id="info-panel">
  <button class="close-btn" onclick="closeInfoPanel()">✕</button>
  <div class="p-name" id="p-name">PLANET</div>
  <div class="p-type" id="p-type">TYPE</div>
  <div class="info-row"><span class="label">Diameter</span><span class="value" id="p-dia">—</span></div>
  <div class="info-row"><span class="label">Orbital Period</span><span class="value" id="p-period">—</span></div>
  <div class="info-row"><span class="label">Surface Temp</span><span class="value" id="p-temp">—</span></div>
  <div class="info-row"><span class="label">Distance (AU)</span><span class="value" id="p-dist">—</span></div>
  <div class="info-row"><span class="label">Moons</span><span class="value" id="p-moons">—</span></div>
  <div class="info-row"><span class="label">Rotation (hrs)</span><span class="value" id="p-rot">—</span></div>
  <div class="p-desc" id="p-desc"></div>
</div>

<!-- Bottom Controls -->
<div id="hud-bottom">
  <div class="ctrl-group">
    <label>Speed</label>
    <input type="range" id="speedSlider" min="0" max="3" step="0.1" value="1">
    <span id="speed-val" style="font-family:'JetBrains Mono'; font-size:12px; color:#0cf; min-width:40px;">1×</span>
  </div>
  <button class="btn" onclick="resetCamera()">Reset View</button>
  <button class="btn" id="tourBtn" onclick="toggleTour()">Cinematic Tour</button>
  <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ═══════════════════════════════════════════════
// SOLAR SYSTEM ENGINE — Core JavaScript
// ═══════════════════════════════════════════════

// ── 1. SCENE SETUP ──
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.00018);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 20000);
camera.position.set(0, 60, 130);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.055;
controls.minDistance = 15;
controls.maxDistance = 2500;

// ── 2. NOISE & TEXTURE GENERATORS ──
function hash(x, y) { return ((Math.sin(x * 127.1 + y * 311.7) * 43758.5453) % 1 + 1) % 1; }
function smoothstep(t) { return t * t * (3 - 2 * t); }
function noise(x, y) {
  const ix = Math.floor(x), iy = Math.floor(y);
  const fx = x - ix, fy = y - iy;
  const a = hash(ix, iy), b = hash(ix+1, iy), c = hash(ix, iy+1), d = hash(ix+1, iy+1);
  const sx = smoothstep(fx), sy = smoothstep(fy);
  return a + (b-a)*sx + (c-a)*sy + (a-b-c+d)*sx*sy;
}
function fbm(x, y, oct=5) {
  let v=0, amp=0.5, freq=1;
  for(let i=0;i<oct;i++){v+=amp*noise(x*freq,y*freq); amp*=0.5; freq*=2.07;}
  return v;
}
function lerpRGB(a,b,t){return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t];}

  function createProceduralTexture(size, colors) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');
    const imgData = ctx.createImageData(size, size);
    for (let y=0; y<size; y++) {
      for (let x=0; x<size; x++) {
        const v = fbm(x/32, y/32);
        const idx = (y*size + x) * 4;
        const c = lerpRGB(colors[0], colors[1], v);
        imgData.data[idx] = c[0]; imgData.data[idx+1] = c[1]; imgData.data[idx+2] = c[2]; imgData.data[idx+3] = 255;
      }
    }
    ctx.putImageData(imgData, 0, 0);
    return new THREE.CanvasTexture(canvas);
  }

  // ── 3. DATA & OBJECTS ──
  const planets = [
    { name: 'Mercury', dist: 28, size: 0.8, speed: 0.047, colors: [[100,100,100],[180,180,180]] },
    { name: 'Venus',   dist: 44, size: 1.8, speed: 0.035, colors: [[200,150,50],[255,200,100]] },
    { name: 'Earth',   dist: 62, size: 2.0, speed: 0.029, colors: [[0,100,200],[100,255,100]] },
    { name: 'Mars',    dist: 82, size: 1.2, speed: 0.024, colors: [[150,50,20],[255,100,50]] },
    { name: 'Jupiter', dist: 140,size: 6.0, speed: 0.013, colors: [[200,180,150],[100,80,60]] },
    { name: 'Saturn',  dist: 190,size: 5.0, speed: 0.009, colors: [[220,200,150],[150,130,100]], rings: true },
    { name: 'Uranus',  dist: 240,size: 3.2, speed: 0.006, colors: [[150,200,255],[100,150,200]] },
    { name: 'Neptune', dist: 280,size: 3.0, speed: 0.005, colors: [[50,100,255],[20,50,150]] }
  ];

  // Sun
  const sunGeom = new THREE.SphereGeometry(12, 64, 64);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });
  const sun = new THREE.Mesh(sunGeom, sunMat);
  scene.add(sun);

  // Light
  const pointLight = new THREE.PointLight(0xffffff, 1.5, 1000);
  scene.add(pointLight);
  scene.add(new THREE.AmbientLight(0x222222));

  const planetMeshes = [];
  planets.forEach(p => {
    const tex = createProceduralTexture(128, p.colors);
    const geom = new THREE.SphereGeometry(p.size, 32, 32);
    const mat = new THREE.MeshStandardMaterial({ map: tex });
    const mesh = new THREE.Mesh(geom, mat);

    const orbit = new THREE.Group();
    scene.add(orbit);
    orbit.add(mesh);
    mesh.position.x = p.dist;

    // Orbit line
    const curve = new THREE.EllipseCurve(0, 0, p.dist, p.dist);
    const points = curve.getPoints(100);
    const orbitGeom = new THREE.BufferGeometry().setFromPoints(points);
    const orbitMat = new THREE.LineBasicMaterial({ color: 0x333333 });
    const orbitLine = new THREE.Line(orbitGeom, orbitMat);
    orbitLine.rotation.x = Math.PI/2;
    scene.add(orbitLine);

    planetMeshes.push({ mesh, orbit, speed: p.speed, name: p.name });
  });

  // ── 4. ANIMATION LOOP ──
  let simTime = 0;
  function animate() {
    requestAnimationFrame(animate);
    const speed = parseFloat(document.getElementById('speedSlider').value);
    simTime += 0.01 * speed;

    planetMeshes.forEach(p => {
      p.orbit.rotation.y += p.speed * speed * 0.2;
      p.mesh.rotation.y += 0.01;
    });

    document.getElementById('sim-time').innerText = `Year ${Math.floor(simTime)}`;
    controls.update();
    renderer.render(scene, camera);
  }

  // Remove loader
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
      animate();
    }, 1000);
  });

  function resetCamera() { controls.reset(); camera.position.set(0, 60, 130); }
  function togglePause() { /* Toggle speed slider or state */ }
  function toggleTour() { /* Simple camera movement */ }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
