<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boids Flocking Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e17;
    color: #c8d6e5;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  canvas {
    flex: 1;
    display: block;
    width: 100%;
  }

  #controls {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(10, 14, 23, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(52, 199, 171, 0.25);
    border-radius: 12px;
    padding: 20px 24px;
    min-width: 260px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    z-index: 10;
  }

  #controls h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #34c7a9;
    margin-bottom: 16px;
    text-align: center;
  }

  .slider-group {
    margin-bottom: 14px;
  }

  .slider-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #8fa8b8;
    margin-bottom: 6px;
  }

  .slider-group label span.val {
    color: #34c7a9;
    font-weight: 600;
    font-family: 'Courier New', monospace;
    min-width: 36px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(52, 199, 171, 0.15);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #34c7a9;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(52, 199, 171, 0.5);
    transition: transform 0.15s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.25);
  }

  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #34c7a9;
    cursor: pointer;
    border: none;
    box-shadow: 0 0 8px rgba(52, 199, 171, 0.5);
  }

  .btn-group {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  button {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(52, 199, 171, 0.3);
    border-radius: 8px;
    background: rgba(52, 199, 171, 0.08);
    color: #34c7a9;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  button:hover {
    background: rgba(52, 199, 171, 0.18);
    border-color: rgba(52, 199, 171, 0.6);
  }

  #info {
    position: absolute;
    bottom: 16px;
    left: 16px;
    font-size: 12px;
    color: rgba(52, 199, 171, 0.5);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="controls">
  <h2>Flock Parameters</h2>

  <div class="slider-group">
    <label>Separation <span class="val" id="sepVal">1.5</span></label>
    <input type="range" id="separation" min="0" max="4" step="0.1" value="1.5">
  </div>

  <div class="slider-group">
    <label>Alignment <span class="val" id="aliVal">1.0</span></label>
    <input type="range" id="alignment" min="0" max="4" step="0.1" value="1.0">
  </div>

  <div class="slider-group">
    <label>Cohesion <span class="val" id="cohVal">1.2</span></label>
    <input type="range" id="cohesion" min="0" max="4" step="0.1" value="1.2">
  </div>

  <div class="slider-group">
    <label>Max Speed <span class="val" id="speedVal">3.5</span></label>
    <input type="range" id="maxSpeed" min="1" max="8" step="0.1" value="3.5">
  </div>

  <div class="slider-group">
    <label>Perception <span class="val" id="percVal">60</span></label>
    <input type="range" id="perception" min="10" max="200" step="1" value="60">
  </div>

  <div class="btn-group">
    <button id="resetBtn">Reset</button>
    <button id="pauseBtn">Pause</button>
  </div>
</div>

<div id="info">Boids Flocking Simulation &mdash; Craig Reynolds, 1986</div>

<script>
// ──────────────────────────────────────────────
// Canvas setup
// ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ──────────────────────────────────────────────
// Simulation parameters (read from sliders)
// ──────────────────────────────────────────────
const NUM_BOIDS = 250;
const SEP_DIST = 25;
const MAX_FORCE = 0.15;

function getParams() {
  return {
    sepWeight: parseFloat(document.getElementById('separation').value),
    aliWeight: parseFloat(document.getElementById('alignment').value),
    cohWeight: parseFloat(document.getElementById('cohesion').value),
    maxSpeed: parseFloat(document.getElementById('maxSpeed').value),
    perception: parseInt(document.getElementById('perception').value),
  };
}

// ──────────────────────────────────────────────
// Boid class
// ──────────────────────────────────────────────
class Boid {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    // Each boid gets a unique hue for visual variety
    this.hue = 150 + Math.random() * 60; // teal-to-cyan range
    this.lightness = 55 + Math.random() * 15;
  }

  update(params, allBoids) {
    const sep = this.separate(params);
    const ali = this.align(params);
    const coh = this.cohere(params);

    // Apply weights from sliders
    this.vx += (sep.x * params.sepWeight +
                ali.x * params.aliWeight +
                coh.x * params.cohWeight) * MAX_FORCE;
    this.vy += (sep.y * params.sepWeight +
                ali.y * params.aliWeight +
                coh.y * params.cohWeight) * MAX_FORCE;

    // Limit speed
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > params.maxSpeed) {
      this.vx = (this.vx / speed) * params.maxSpeed;
      this.vy = (this.vy / speed) * params.maxSpeed;
    } else if (speed < params.maxSpeed * 0.5) {
      // Minimum speed to keep things moving
      const minSpeed = params.maxSpeed * 0.5;
      this.vx = (this.vx / (speed || 0.01)) * minSpeed;
      this.vy = (this.vy / (speed || 0.01)) * minSpeed;
    }

    // Move
    this.x += this.vx;
    this.y += this.vy;

    // Edge wrapping — smooth wrap-around
    if (this.x < -5) this.x = W + 5;
    else if (this.x > W + 5) this.x = -5;
    if (this.y < -5) this.y = H + 5;
    else if (this.y > H + 5) this.y = -5;
  }

  // Rule 1: Separation — steer away from close neighbors
  separate(params) {
    let sx = 0, sy = 0, count = 0;
    for (let i = 0; i < allBoids.length; i++) {
      const other = allBoids[i];
      if (other === this) continue;
      const dx = this.x - other.x;
      const dy = this.y - other.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < SEP_DIST && d > 0) {
        sx += dx / d;
        sy += dy / d;
        count++;
      }
    }
    if (count > 0) {
      sx /= count;
      sy /= count;
      const m = Math.sqrt(sx * sx + sy * sy);
      if (m > 0) {
        sx = (sx / m) * params.maxSpeed - this.vx;
        sy = (sy / m) * params.maxSpeed - this.vy;
      }
    }
    return { x: sx, y: sy };
  }

  // Rule 2: Alignment — steer toward average heading of neighbors
  align(params) {
    let ax = 0, ay = 0, count = 0;
    for (let i = 0; i < allBoids.length; i++) {
      const other = allBoids[i];
      if (other === this) continue;
      const dx = this.x - other.x;
      const dy = this.y - other.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < params.perception) {
        ax += other.vx;
        ay += other.vy;
        count++;
      }
    }
    if (count > 0) {
      ax /= count;
      ay /= count;
      const m = Math.sqrt(ax * ax + ay * ay);
      if (m > 0) {
        ax = (ax / m) * params.maxSpeed - this.vx;
        ay = (ay / m) * params.maxSpeed - this.vy;
      }
    }
    return { x: ax, y: ay };
  }

  // Rule 3: Cohesion — steer toward center of mass of neighbors
  cohere(params) {
    let cx = 0, cy = 0, count = 0;
    for (let i = 0; i < allBoids.length; i++) {
      const other = allBoids[i];
      if (other === this) continue;
      const dx = this.x - other.x;
      const dy = this.y - other.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < params.perception) {
        cx += other.x;
        cy += other.y;
        count++;
      }
    }
    if (count > 0) {
      cx /= count - this.x;  // center of mass minus self offset
      cy /= count - this.y;
      cx = cx / (count > 1 ? count : 1) - this.x + this.x;
      cy = cy / (count > 1 ? count : 1) - this.y + this.y;
      // Correct: steer toward center of neighbors
      const avgX = cx;
      const avgY = cy;
      let dx = avgX - this.x;
      let dy = avgY - this.y;
      const m = Math.sqrt(dx * dx + dy * dy);
      if (m > 0) {
        dx = (dx / m) * params.maxSpeed - this.vx;
        dy = (dy / m) * params.maxSpeed - this.vy;
      }
      return { x: dx, y: dy };
    }
    return { x: 0, y: 0 };
  }

  draw(ctx) {
    const angle = Math.atan2(this.vy, this.vx);
    const size = 6 + Math.min(Math.sqrt(this.vx * this.vx + this.vy * this.vy), 3);

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(angle);

    // Glow
    ctx.shadowBlur = 8;
    ctx.shadowColor = `hsla(${this.hue}, 70%, ${this.lightness}%, 0.6)`;

    // Triangle body
    ctx.beginPath();
    ctx.moveTo(size * 1.5, 0);
    ctx.lineTo(-size, -size * 0.5);
    ctx.lineTo(-size, size * 0.5);
    ctx.closePath();

    const grad = ctx.createLinearGradient(-size, 0, size * 1.5, 0);
    grad.addColorStop(0, `hsla(${this.hue}, 60%, ${this.lightness - 10}%, 0.8)`);
    grad.addColorStop(1, `hsla(${this.hue + 20}, 75%, ${this.lightness}%, 0.9)`);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.restore();
  }
}

// ──────────────────────────────────────────────
// Initialize boids
// ──────────────────────────────────────────────
let boids = [];

function initBoids() {
  boids = [];
  for (let i = 0; i < NUM_BOIDS; i++) {
    boids.push(new Boid(
      Math.random() * W,
      Math.random() * H
    ));
  }
}
initBoids();

// ──────────────────────────────────────────────
// Slider sync
// ──────────────────────────────────────────────
const sliders = {
  separation:   { el: document.getElementById('separation'),   valEl: document.getElementById('sepVal') },
  alignment:    { el: document.getElementById('alignment'),    valEl: document.getElementById('aliVal') },
  cohesion:     { el: document.getElementById('cohesion'),     valEl: document.getElementById('cohVal') },
  maxSpeed:     { el: document.getElementById('maxSpeed'),     valEl: document.getElementById
